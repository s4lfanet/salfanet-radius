name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ─── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ─── 4. Generate Prisma client ──────────────────────────────────────────
      # prisma generate does NOT connect to a real DB — schema only
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/salfanet_build"

      # ─── 4b. Sync package.json version with release tag ─────────────────────
      - name: Sync package.json version with release tag
        run: |
          VERSION_CLEAN="${GITHUB_REF_NAME#v}"
          npm version "$VERSION_CLEAN" --no-git-tag-version
          echo "[✓] package.json version bumped to $VERSION_CLEAN"

      # ─── 5. Build Next.js (standalone) ──────────────────────────────────────
      # All API routes use force-dynamic so no real DB connection at build time
      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/salfanet_build"
          NEXTAUTH_SECRET: "build-placeholder-secret-min-32-chars-xxxx"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=4096 --max-semi-space-size=128"

      # ─── 6. Extract version from tag ────────────────────────────────────────
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # ─── 7. Package webupload ZIP ────────────────────────────────────────────
      # Contains the full standalone build ready to deploy on VPS
      - name: Package webupload
        run: |
          APPDIR="webupload-staging"
          mkdir -p "$APPDIR"

          # Copy standalone Next.js build (includes node_modules + server.js)
          cp -r .next/standalone/. "$APPDIR/"

          # Copy built assets (.next/static must be placed inside standalone)
          mkdir -p "$APPDIR/.next/static"
          cp -r .next/static/. "$APPDIR/.next/static/"

          # Copy public/ (already done by postbuild, but ensure it's there)
          if [ -d .next/standalone/public ]; then
            echo "[✓] public/ already in standalone"
          else
            cp -r public "$APPDIR/public"
          fi

          # Copy prisma schema + seeds (for db push on VPS)
          mkdir -p "$APPDIR/prisma"
          cp prisma/schema.prisma "$APPDIR/prisma/"
          if [ -d prisma/seeds ]; then
            cp -r prisma/seeds "$APPDIR/prisma/"
          fi

          # Embed version file
          echo "${{ steps.version.outputs.VERSION }}" > "$APPDIR/VERSION"

          # Zip (amd64 and arm64 are same — Next.js standalone is arch-independent JS)
          zip -r webupload-amd64.zip "$APPDIR"
          cp webupload-amd64.zip webupload-arm64.zip

          echo "[✓] webupload packages created"
          ls -lh webupload-*.zip

      # ─── 8. Prepare installer & updater scripts ──────────────────────────────
      - name: Prepare installer and updater scripts
        run: |
          # Installer = full VPS setup from scratch
          cp vps-install/vps-installer.sh installer-linux-amd64
          chmod +x installer-linux-amd64
          cp installer-linux-amd64 installer-linux-arm64

          # Updater = update existing installation
          cp vps-install/updater.sh updater-linux-amd64 2>/dev/null || \
            cp scripts/run-deploy.js /dev/null && \
            cat > updater-linux-amd64 << 'UPDATER_EOF'
          #!/bin/bash
          # Auto-generated fallback updater — use vps-install/updater.sh from repo
          echo "Please run: bash <(curl -sSL https://raw.githubusercontent.com/s4lfanet/salfanet-radius/master/vps-install/updater.sh)"
          UPDATER_EOF

          chmod +x updater-linux-amd64
          cp updater-linux-amd64 updater-linux-arm64

          echo "[✓] Scripts prepared"
          ls -lh installer-linux-* updater-linux-*

      # ─── 9. Read changelog for release notes ────────────────────────────────
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Try to extract relevant section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract content between this version header and the next
            NOTES=$(awk "/^## \[?${VERSION//v/}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md | head -60)
            if [ -z "$NOTES" ]; then
              NOTES="Release ${VERSION}"
            fi
          else
            NOTES="Release ${VERSION}"
          fi
          # Write to file (avoids quoting issues)
          echo "$NOTES" > release-notes.txt
          cat release-notes.txt

      # ─── 10. Create GitHub Release + upload assets ──────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Salfanet Radius ${{ steps.version.outputs.VERSION }}"
          body_path: release-notes.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          files: |
            installer-linux-amd64
            installer-linux-arm64
            updater-linux-amd64
            updater-linux-arm64
            webupload-amd64.zip
            webupload-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
